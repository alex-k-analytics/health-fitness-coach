name: Bootstrap Infra

on:
  workflow_dispatch:

concurrency:
  group: bootstrap-infra
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PROJECT_ID: akalish-software
  REGION: us-central1
  SERVICE_NAME: health-fitness-coach
  SCRAPER_SERVICE_NAME: health-fitness-coach-scraper
  ARTIFACT_REPOSITORY_ID: health-fitness-coach
  WIF_PROVIDER: projects/698032141114/locations/global/workloadIdentityPools/github-actions-pool/providers/github
  BOOTSTRAP_SERVICE_ACCOUNT: github-actions-bootstrap@akalish-software.iam.gserviceaccount.com
  DEPLOYER_SERVICE_ACCOUNT: github-actions-service-account@akalish-software.iam.gserviceaccount.com
  BOOTSTRAP_IMAGE: us-docker.pkg.dev/cloudrun/container/hello

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    env:
      TF_VAR_project_id: akalish-software
      TF_VAR_region: us-central1
      TF_VAR_service_name: health-fitness-coach
      TF_VAR_scraper_service_name: health-fitness-coach-scraper
      TF_VAR_artifact_repository_id: health-fitness-coach
      TF_VAR_deployer_service_account_email: github-actions-service-account@akalish-software.iam.gserviceaccount.com
      TF_VAR_bootstrap_service_account_email: github-actions-bootstrap@akalish-software.iam.gserviceaccount.com
      TF_VAR_app_image: us-docker.pkg.dev/cloudrun/container/hello
      TF_VAR_scraper_image: us-docker.pkg.dev/cloudrun/container/hello
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.BOOTSTRAP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Ensure bootstrap networking IAM
        run: |
          set -euo pipefail

          for role in \
            roles/compute.networkAdmin \
            roles/vpcaccess.admin \
            roles/serviceusage.serviceUsageAdmin
          do
            gcloud projects add-iam-policy-binding "${PROJECT_ID}" \
              --member="serviceAccount:${BOOTSTRAP_SERVICE_ACCOUNT}" \
              --role="${role}" \
              --quiet
          done

          sleep 15

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -input=false

      - name: Bootstrap infrastructure with placeholder image
        working-directory: infra/terraform
        run: terraform apply -auto-approve -input=false -lock-timeout=10m

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Apply database migrations
        env:
          CLOUD_SQL_CONNECTION_NAME: akalish-software:us-central1:health-fitness-coach-db
          DATABASE_URL_SECRET: health-fitness-coach-database-url
        run: |
          set -euo pipefail

          curl -L https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.18.3/cloud-sql-proxy.linux.amd64 -o cloud-sql-proxy
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy --credentials-file="${GOOGLE_APPLICATION_CREDENTIALS}" --port 6543 "${CLOUD_SQL_CONNECTION_NAME}" &
          PROXY_PID=$!
          trap 'kill ${PROXY_PID}' EXIT

          for _ in $(seq 1 20); do
            if nc -z 127.0.0.1 6543; then
              break
            fi
            sleep 1
          done

          DB_SECRET="$(gcloud secrets versions access latest --secret="${DATABASE_URL_SECRET}" --project="${PROJECT_ID}")"
          export DATABASE_URL="$(node -e 'const url = new URL(process.argv[1]); url.hostname = "127.0.0.1"; url.port = "6543"; url.search = ""; console.log(url.toString())' "${DB_SECRET}")"

          cd backend
          npm run prisma:migrate:deploy

      - name: Capture service URL
        working-directory: infra/terraform
        run: echo "SERVICE_URL=$(terraform output -raw service_url)" >> "${GITHUB_ENV}"

      - name: Persist app base URL
        working-directory: infra/terraform
        env:
          TF_VAR_project_id: akalish-software
          TF_VAR_region: us-central1
          TF_VAR_service_name: health-fitness-coach
          TF_VAR_scraper_service_name: health-fitness-coach-scraper
          TF_VAR_artifact_repository_id: health-fitness-coach
          TF_VAR_deployer_service_account_email: github-actions-service-account@akalish-software.iam.gserviceaccount.com
          TF_VAR_bootstrap_service_account_email: github-actions-bootstrap@akalish-software.iam.gserviceaccount.com
          TF_VAR_app_image: us-docker.pkg.dev/cloudrun/container/hello
          TF_VAR_scraper_image: us-docker.pkg.dev/cloudrun/container/hello
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_app_base_url: ${{ env.SERVICE_URL }}
        run: terraform apply -auto-approve -input=false -lock-timeout=10m

      - name: Show Terraform outputs
        working-directory: infra/terraform
        run: terraform output
