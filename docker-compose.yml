services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
      POSTGRES_DB: coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  meal-plan-scraper:
    build:
      context: ./scraper-service
    restart: unless-stopped
    environment:
      PORT: 5050
    ports:
      - "5050:5050"

volumes:
  postgres_data:
